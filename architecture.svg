<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">거시경제 대시보드 — 시스템 아키텍처</text>

  <!-- ── Layer Labels ── -->
  <text x="30" y="95" font-size="12" fill="#64748b" font-weight="bold">수집 레이어</text>
  <text x="30" y="270" font-size="12" fill="#64748b" font-weight="bold">저장 레이어</text>
  <text x="30" y="400" font-size="12" fill="#64748b" font-weight="bold">시각화 레이어</text>
  <text x="30" y="510" font-size="12" fill="#64748b" font-weight="bold">자동화 레이어</text>

  <!-- ── 수집 레이어 ── -->
  <!-- FRED API -->
  <rect x="80" y="105" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">FRED API</text>
  <text x="155" y="152" text-anchor="middle" font-size="10" fill="#1e40af">미국 금리 · CPI · PCE</text>
  <text x="155" y="166" text-anchor="middle" font-size="10" fill="#1e40af">실업률 · 소비자심리</text>

  <!-- yfinance -->
  <rect x="260" y="105" width="150" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="335" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">yfinance</text>
  <text x="335" y="152" text-anchor="middle" font-size="10" fill="#166534">주가 · 지수 · 환율</text>
  <text x="335" y="166" text-anchor="middle" font-size="10" fill="#166534">원자재 (12개)</text>

  <!-- ECOS API -->
  <rect x="440" y="105" width="150" height="70" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="515" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">ECOS API (BOK)</text>
  <text x="515" y="152" text-anchor="middle" font-size="10" fill="#78350f">한국 기준금리 · CPI</text>
  <text x="515" y="166" text-anchor="middle" font-size="10" fill="#78350f">수출금액지수</text>

  <!-- collectors -->
  <rect x="640" y="105" width="200" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="740" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">collectors/</text>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#475569">fred.py</text>
  <text x="740" y="163" text-anchor="middle" font-size="10" fill="#475569">market.py · ecos.py</text>

  <!-- Arrows: APIs → collectors -->
  <line x1="230" y1="140" x2="638" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="140" x2="638" y2="140" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="590" y1="140" x2="638" y2="140" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ── 저장 레이어 ── -->
  <!-- scheduler.py -->
  <rect x="560" y="240" width="160" height="50" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="640" y="261" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">scheduler.py</text>
  <text x="640" y="279" text-anchor="middle" font-size="10" fill="#6b21a8">수집 오케스트레이션</text>

  <!-- Arrow: collectors → scheduler -->
  <line x1="740" y1="175" x2="740" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="255" x2="720" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLite DB -->
  <rect x="330" y="240" width="160" height="50" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="410" y="261" text-anchor="middle" font-size="12" font-weight="bold" fill="#be185d">SQLite DB</text>
  <text x="410" y="279" text-anchor="middle" font-size="10" fill="#9d174d">db/macro.db (23종 지표)</text>

  <!-- Arrow: scheduler → SQLite -->
  <line x1="560" y1="265" x2="492" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- validator -->
  <rect x="100" y="240" width="160" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="180" y="261" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">utils/validator.py</text>
  <text x="180" y="279" text-anchor="middle" font-size="10" fill="#15803d">범위 기반 이상값 검증</text>

  <!-- Arrow: scheduler → validator -->
  <line x1="560" y1="258" x2="262" y2="258" stroke="#86efac" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- ── 시각화 레이어 ── -->
  <!-- Streamlit App -->
  <rect x="250" y="370" width="200" height="60" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="350" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2410c">Streamlit App</text>
  <text x="350" y="414" text-anchor="middle" font-size="10" fill="#9a3412">dashboard/app.py</text>

  <!-- Browser -->
  <rect x="530" y="370" width="200" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="630" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">브라우저 대시보드</text>
  <text x="630" y="414" text-anchor="middle" font-size="10" fill="#047857">4탭 · KPI · 차트 · 히트맵</text>

  <!-- Arrow: SQLite → Streamlit -->
  <line x1="410" y1="290" x2="350" y2="368" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Streamlit → Browser -->
  <line x1="450" y1="400" x2="528" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── 자동화 레이어 ── -->
  <!-- GitHub Actions -->
  <rect x="80" y="480" width="200" height="50" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="180" y="501" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">GitHub Actions</text>
  <text x="180" y="519" text-anchor="middle" font-size="10" fill="#075985">매일 KST 10:00 수집 스케줄</text>

  <!-- GitHub Repo -->
  <rect x="330" y="480" width="200" height="50" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="430" y="501" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">GitHub Repository</text>
  <text x="430" y="519" text-anchor="middle" font-size="10" fill="#475569">코드 + DB 백업 커밋</text>

  <!-- notifier -->
  <rect x="590" y="480" width="200" height="50" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="690" y="501" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">utils/notifier.py</text>
  <text x="690" y="519" text-anchor="middle" font-size="10" fill="#991b1b">Gmail 에러 알림</text>

  <!-- Arrow: Actions → scheduler -->
  <line x1="280" y1="505" x2="600" y2="270" stroke="#0ea5e9" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: Actions → GitHub Repo -->
  <line x1="280" y1="505" x2="328" y2="505" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: scheduler → notifier -->
  <line x1="640" y1="290" x2="690" y2="478" stroke="#f87171" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>

  <!-- ── Arrow Markers ── -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#86efac"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="680" y="200" width="185" height="90" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="772" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">범례</text>
  <line x1="695" y1="230" x2="720" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="728" y="234" font-size="10" fill="#334155">데이터 흐름</text>
  <line x1="695" y1="248" x2="720" y2="248" stroke="#86efac" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="728" y="252" font-size="10" fill="#334155">검증</text>
  <line x1="695" y1="266" x2="720" y2="266" stroke="#0ea5e9" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrowBlue)"/>
  <text x="728" y="270" font-size="10" fill="#334155">트리거</text>
  <line x1="695" y1="284" x2="720" y2="284" stroke="#f87171" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="728" y="288" font-size="10" fill="#334155">에러 알림</text>

</svg>
