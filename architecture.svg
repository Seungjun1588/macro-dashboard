<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#22c55e"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#1e293b">거시경제 대시보드 — 시스템 아키텍처</text>

  <!-- ══════════════ LAYER BACKGROUND BOXES (drawn first = behind content) ══════════════ -->

  <!-- 수집 레이어 bg -->
  <rect x="60" y="48" width="620" height="130" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="72" y="62" font-size="11" font-weight="bold" fill="#3B82F6">수집 레이어</text>

  <!-- 처리 레이어 bg -->
  <rect x="60" y="183" width="755" height="205" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.2"/>
  <text x="72" y="197" font-size="11" font-weight="bold" fill="#64748B">처리 레이어</text>

  <!-- 저장 레이어 bg -->
  <rect x="60" y="393" width="490" height="93" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.2"/>
  <text x="72" y="407" font-size="11" font-weight="bold" fill="#EC4899">저장 레이어</text>

  <!-- 시각화 레이어 bg -->
  <rect x="60" y="492" width="618" height="105" rx="10" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.2"/>
  <text x="72" y="506" font-size="11" font-weight="bold" fill="#F97316">시각화 레이어</text>

  <!-- 자동화 레이어 bg -->
  <rect x="60" y="602" width="510" height="83" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.2"/>
  <text x="72" y="616" font-size="11" font-weight="bold" fill="#0EA5E9">자동화 레이어</text>

  <!-- ══════════════ ROW 1: DATA SOURCES ══════════════ -->

  <rect x="75"  y="63" width="165" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="157" y="90"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">FRED API</text>
  <text x="157" y="108" text-anchor="middle" font-size="10" fill="#1e40af">금리 · CPI · PCE</text>
  <text x="157" y="123" text-anchor="middle" font-size="10" fill="#1e40af">실업률 · 소비자심리</text>

  <rect x="283" y="63" width="165" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="365" y="90"  text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">yfinance</text>
  <text x="365" y="108" text-anchor="middle" font-size="10" fill="#166534">주가 · 지수 · 환율</text>
  <text x="365" y="123" text-anchor="middle" font-size="10" fill="#166534">원자재 (12개)</text>

  <rect x="491" y="63" width="165" height="70" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="573" y="90"  text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">ECOS API</text>
  <text x="573" y="108" text-anchor="middle" font-size="10" fill="#78350f">기준금리 · CPI</text>
  <text x="573" y="123" text-anchor="middle" font-size="10" fill="#78350f">수출금액지수</text>

  <!-- Bus: sources → collectors -->
  <line x1="157" y1="133" x2="157" y2="163" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="365" y1="133" x2="365" y2="163" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="573" y1="133" x2="573" y2="163" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="157" y1="163" x2="573" y2="163" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="365" y1="163" x2="365" y2="188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════ ROW 2: COLLECTORS ══════════════ -->

  <rect x="195" y="193" width="340" height="58" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="365" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">collectors/</text>
  <text x="365" y="237" text-anchor="middle" font-size="10" fill="#475569">fred.py  ·  market.py  ·  ecos.py</text>

  <rect x="595" y="193" width="210" height="58" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="700" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">validator.py</text>
  <text x="700" y="237" text-anchor="middle" font-size="10" fill="#15803d">이상값 범위 검증</text>

  <line x1="535" y1="222" x2="593" y2="222" stroke="#86efac" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <line x1="365" y1="251" x2="365" y2="293" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════ ROW 3: SCHEDULER ══════════════ -->

  <rect x="195" y="298" width="340" height="58" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="365" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#7e22ce">scheduler.py</text>
  <text x="365" y="342" text-anchor="middle" font-size="10" fill="#6b21a8">수집 오케스트레이션</text>

  <rect x="595" y="298" width="210" height="58" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="700" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">notifier.py</text>
  <text x="700" y="342" text-anchor="middle" font-size="10" fill="#991b1b">Gmail 에러 알림</text>

  <line x1="535" y1="327" x2="593" y2="327" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <line x1="365" y1="356" x2="365" y2="398" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════ ROW 4: SQLITE ══════════════ -->

  <rect x="195" y="408" width="340" height="58" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="365" y="433" text-anchor="middle" font-size="13" font-weight="bold" fill="#be185d">SQLite DB</text>
  <text x="365" y="452" text-anchor="middle" font-size="10" fill="#9d174d">db/macro.db  —  23종 지표</text>

  <line x1="365" y1="466" x2="365" y2="497" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════ ROW 5: VISUALIZATION ══════════════ -->

  <rect x="195" y="508" width="215" height="58" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="302" y="533" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2410c">Streamlit App</text>
  <text x="302" y="552" text-anchor="middle" font-size="10" fill="#9a3412">dashboard/app.py</text>

  <rect x="460" y="508" width="210" height="58" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="565" y="533" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">브라우저 대시보드</text>
  <text x="565" y="552" text-anchor="middle" font-size="10" fill="#047857">4탭 · KPI · 차트 · 히트맵</text>

  <line x1="410" y1="537" x2="458" y2="537" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════ ROW 6: AUTOMATION ══════════════ -->

  <rect x="75"  y="618" width="215" height="58" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="182" y="643" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">GitHub Actions</text>
  <text x="182" y="661" text-anchor="middle" font-size="10" fill="#075985">매일 KST 10:00 자동 수집</text>

  <rect x="340" y="618" width="220" height="58" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="643" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">GitHub Repository</text>
  <text x="450" y="661" text-anchor="middle" font-size="10" fill="#475569">코드 + DB 백업 커밋</text>

  <line x1="290" y1="647" x2="338" y2="647" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- GitHub Actions → scheduler: up left margin -->
  <polyline points="130,618 45,618 45,327 193,327"
    fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrBlue)"/>

  <!-- ══════════════ LEGEND ══════════════ -->
  <rect x="672" y="588" width="192" height="98" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="768" y="604" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">범 례</text>

  <line x1="682" y1="616" x2="706" y2="616" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="713" y="619" font-size="9" fill="#334155">데이터 흐름</text>

  <line x1="682" y1="630" x2="706" y2="630" stroke="#86efac" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="713" y="633" font-size="9" fill="#334155">검증</text>

  <line x1="682" y1="644" x2="706" y2="644" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrBlue)"/>
  <text x="713" y="647" font-size="9" fill="#334155">트리거 / 자동화</text>

  <line x1="682" y1="658" x2="706" y2="658" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="713" y="661" font-size="9" fill="#334155">에러 알림</text>

  <line x1="682" y1="672" x2="706" y2="672" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="713" y="675" font-size="9" fill="#334155">직접 실행 가능</text>

</svg>
