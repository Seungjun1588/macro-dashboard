name: Daily Data Collection

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 UTC 01:00 (KST 10:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (with DB)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scheduler.py

      - name: Data health check (deterministic script)
        run: |
          python scripts/macro_health_check.py | tee health_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js (for Claude Code CLI)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Narrate health report
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "health_report.md 파일을 읽고 보기 좋게 다듬어 요약해줘" \
            --agent health-report-narrator \
            --permission-mode bypassPermissions \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/macro.db
          git diff --staged --quiet || git commit -m "data: daily collect $(date +%Y-%m-%d)"
          git push
